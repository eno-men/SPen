<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S Pen ve İşaretçi Tanılama Aracı</title>
<link rel="icon" href="https://i.hizliresim.com/eqbsaii.png" type="image/png">

<style>
    :root {
        --bg-color: #0f0f0f;
        --text-main: #ffffff;
        --text-muted: #a3a3a3;
        --accent-green: #4ade80;
        --accent-red: #ef4444;
        --accent-blue: #60a5fa;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: var(--bg-color);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none; 
    }

    #cizimAlani {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
        touch-action: none;
    }

    #panel {
        position: fixed;
        top: clamp(10px, 2vh, 15px);
        left: clamp(10px, 2vw, 15px);
        width: clamp(280px, 92vw, 360px);
        max-height: calc(100vh - 30px);
        overflow: hidden;
        padding: clamp(10px, 2vh, 20px);
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
    }

    #panel > * {
        pointer-events: auto;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: clamp(5px, 1vh, 10px);
        margin-bottom: clamp(10px, 2vh, 15px);
    }

    .header-container h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
    }

    .header-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 11px;
        font-weight: 500;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(4px, 1vh, 10px);
        flex-grow: 1;
    }

    .veri-kutusu {
        padding: clamp(2px, 0.5vh, 5px) 0;
    }

    .etiket {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        display: block;
    }

    .deger {
        color: var(--accent-green);
        font-weight: 600;
        font-size: 16px;
        font-family: monospace;
    }

    .genis-kutu {
        grid-column: span 2;
    }

    #durum {
        margin-top: clamp(10px, 2vh, 15px);
        font-size: clamp(14px, 2.5vh, 18px);
        font-weight: bold;
        text-align: center;
        padding: clamp(8px, 1.5vh, 12px) 0;
    }

    .basili { color: var(--accent-green); }
    .basiliDegil { color: var(--accent-red); }

    #hover {
        color: var(--accent-blue);
        font-size: clamp(12px, 2vh, 16px);
        text-align: center;
        margin-top: clamp(5px, 1vh, 10px);
        font-weight: 500;
        min-height: 20px;
    }

    #imlec {
        position: fixed;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.5);
        pointer-events: none;
        transform: translate(-50%, -50%);
        z-index: 100;
        display: none;
        will-change: left, top, width, height, background-color;
    }

    .butonlar {
        display: flex;
        gap: 10px;
        margin-top: clamp(10px, 2vh, 15px);
    }

    button {
        flex: 1;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 500;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
    }

    @media (max-width: 600px) {
        #panel {
            top: 10px; left: 10px; right: 10px;
            width: auto;
        }
    }
</style>
</head>

<body>

<canvas id="cizimAlani"></canvas>
<div id="imlec"></div>

<div id="panel">
    <div class="header-container">
        <h1>Tanılama Verileri</h1>
        <a href="https://many.bio/enomen" target="_blank" class="header-link">enomen</a>
    </div>

    <div class="grid-container">
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Aygıt Tipi / Yenileme (Hz)</span>
            <span class="deger" id="tur">-</span> | <span class="deger" id="hz" style="color: #facc15;">0 Hz</span>
        </div>
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Olay (Event)</span>
            <span class="deger" id="eventType">-</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Koordinat X</span>
            <span class="deger" id="x">0</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Koordinat Y</span>
            <span class="deger" id="y">0</span>
        </div>
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Basınç (Pressure)</span>
            <span class="deger" id="pressure">0.000</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Eğim X (Tilt X)</span>
            <span class="deger" id="tiltX">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Eğim Y (Tilt Y)</span>
            <span class="deger" id="tiltY">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Yön (Azimuth)</span>
            <span class="deger" id="azimuth">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">İrtifa (Altitude)</span>
            <span class="deger" id="altitude">0</span>°
        </div>
    </div>

    <div id="durum" class="basiliDegil">Hazır Bekleniyor</div>
    <div id="hover"></div>

    <div class="butonlar">
        <button onclick="temizle()">Çizimi Temizle</button>
        <button onclick="tamEkran()">Tam Ekran</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("cizimAlani");
    const ctx = canvas.getContext("2d"); 
    const imlec = document.getElementById("imlec");

    // DOM referansları
    const els = {
        tur: document.getElementById("tur"),
        hz: document.getElementById("hz"),
        eventType: document.getElementById("eventType"),
        x: document.getElementById("x"),
        y: document.getElementById("y"),
        pressure: document.getElementById("pressure"),
        tiltX: document.getElementById("tiltX"),
        tiltY: document.getElementById("tiltY"),
        azimuth: document.getElementById("azimuth"),
        altitude: document.getElementById("altitude"),
        durum: document.getElementById("durum"),
        hover: document.getElementById("hover")
    };

    // DOM güncelleme maliyetini düşürmek için State (Durum) Önbelleği
    const state = {
        tur: null, eventType: null, x: null, y: null, pressure: null,
        tiltX: null, tiltY: null, azimuth: null, altitude: null,
        durumText: null, durumClass: null, hoverText: null, hoverColor: null,
        imlecW: null, imlecH: null, imlecBg: null, imlecBorder: null, imlecDisplay: null
    };

    function updateDOM(key, value, isClass = false, isStyleColor = false) {
        if (state[key] !== value) {
            if (isClass) els[key.replace('Class', '')].className = value;
            else if (isStyleColor) els[key.replace('Color', '')].style.color = value;
            else els[key].textContent = value;
            state[key] = value;
        }
    }

    function updateImlec(key, value) {
        if (state[key] !== value) {
            if (key === 'imlecW') imlec.style.width = value;
            if (key === 'imlecH') imlec.style.height = value;
            if (key === 'imlecBg') imlec.style.backgroundColor = value;
            if (key === 'imlecBorder') imlec.style.borderColor = value;
            if (key === 'imlecDisplay') imlec.style.display = value;
            state[key] = value;
        }
    }

    let ciziliyorMu = false;
    let sonX = 0;
    let sonY = 0;
    
    // Yüksek performanslı Hz sayacı
    let eventSayaci = 0;
    setInterval(() => {
        if (state.hz !== eventSayaci) {
            els.hz.textContent = `${eventSayaci} Hz`;
            state.hz = eventSayaci;
        }
        eventSayaci = 0;
    }, 1000);

    function tuvaliSabitle() {
        const ekranG = window.screen.width || window.innerWidth;
        const ekranY = window.screen.height || window.innerHeight;
        const devasaBoyut = Math.max(ekranG, ekranY) * 2;
        canvas.width = devasaBoyut;
        canvas.height = devasaBoyut;
    }
    tuvaliSabitle();

    function temizle() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function tamEkran() {
        const doc = window.document;
        const docEl = doc.documentElement;
        const requestFullScreen = docEl.requestFullscreen || docEl.webkitRequestFullScreen;
        const cancelFullScreen = doc.exitFullscreen || doc.webkitExitFullscreen;
        if(!doc.fullscreenElement && !doc.webkitFullscreenElement) {
            if (requestFullScreen) requestFullScreen.call(docEl).catch(() => {});
        } else {
            if (cancelFullScreen) cancelFullScreen.call(doc);
        }
    }

    function aygitAdi(pointerType) {
        if(pointerType === "pen") return "Kalem / S Pen";
        if(pointerType === "touch") return "Dokunmatik";
        if(pointerType === "mouse") return "Mouse";
        return pointerType || "Bilinmiyor";
    }

    function rad2deg(rad) { return (rad * 180 / Math.PI).toFixed(1); }

    let hoverZamanAsimi;

    // Sadece performans gerektiren olaylar (pointerrawupdate kaldırıldı)
    const olaylar = [
        "pointermove", "pointerdown", "pointerup", 
        "pointercancel", "pointerout", "pointerleave"
    ];

    olaylar.forEach(tip => {
        window.addEventListener(tip, e => {
            if(tip === "pointermove") eventSayaci++;

            const panelUzerinde = e.target instanceof Element && !!e.target.closest('#panel');
            if (!panelUzerinde && e.cancelable) e.preventDefault(); 

            // 1. ÇİZİM İŞLEMLERİ (Öncelikli ve Anlık)
            if (tip === "pointerdown" && !panelUzerinde) {
                ciziliyorMu = true;
                sonX = e.clientX;
                sonY = e.clientY;
                try { canvas.setPointerCapture(e.pointerId); } catch(err) {} 
            } else if (tip === "pointermove" && ciziliyorMu) {
                ctx.beginPath();
                ctx.moveTo(sonX, sonY);
                ctx.lineTo(e.clientX, e.clientY);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = e.pointerType === "pen" ? Math.max(1, e.pressure * 10) : 2;
                
                if (e.pointerType === "pen") ctx.strokeStyle = '#4ade80';
                else if (e.pointerType === "touch") ctx.strokeStyle = '#60a5fa';
                else ctx.strokeStyle = '#ffffff';

                ctx.stroke();
                sonX = e.clientX;
                sonY = e.clientY;
            } else if (["pointerup", "pointercancel", "pointerout", "pointerleave"].includes(tip)) {
                ciziliyorMu = false;
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
            }

            // 2. DOM GÜNCELLEMELERİ (Sadece değerler değiştiğinde tetiklenir)
            updateDOM('tur', aygitAdi(e.pointerType));
            updateDOM('eventType', tip);
            updateDOM('x', Math.round(e.clientX));
            updateDOM('y', Math.round(e.clientY));
            updateDOM('pressure', e.pressure.toFixed(3));
            updateDOM('tiltX', Math.round(e.tiltX || 0));
            updateDOM('tiltY', Math.round(e.tiltY || 0));
            updateDOM('azimuth', e.azimuthAngle !== undefined ? rad2deg(e.azimuthAngle) : "D/Y");
            updateDOM('altitude', e.altitudeAngle !== undefined ? rad2deg(e.altitudeAngle) : "D/Y");

            if (["pointerout", "pointerleave", "pointercancel"].includes(tip)) {
                updateImlec('imlecDisplay', "none");
            } else {
                updateImlec('imlecDisplay', "block");
                
                // İmleç koordinatlarını her harakette yazmak zorundayız
                imlec.style.left = e.clientX + "px";
                imlec.style.top = e.clientY + "px";
                
                let gorselBasinc = e.pressure > 0 ? e.pressure : 0.1;
                updateImlec('imlecW', `${20 * gorselBasinc}px`);
                updateImlec('imlecH', `${20 * gorselBasinc}px`);
                
                if (e.pointerType === "pen" && e.pressure > 0) {
                    updateImlec('imlecBg', "rgba(74, 222, 128, 0.5)");
                    updateImlec('imlecBorder', "transparent");
                } else {
                    updateImlec('imlecBg', "transparent");
                    updateImlec('imlecBorder', "rgba(255,255,255,0.5)");
                }
            }

            let basili = (e.buttons > 0);
            if(basili) {
                updateDOM('durum', e.pointerType === "pen" && e.buttons === 2 ? "S Pen Tuşuna + Ekrana Basıldı" : "Ekrana Temas Ediliyor");
                updateDOM('durumClass', "basili", true);
            } else {
                updateDOM('durum', "Temas Yok");
                updateDOM('durumClass', "basiliDegil", true);
            }

            clearTimeout(hoverZamanAsimi);
            if (e.pointerType === "pen" && e.pressure === 0 && !["pointerout", "pointercancel", "pointerleave"].includes(tip)) {
                updateDOM('hover', e.buttons === 2 ? "S Pen Havada + Tuşa Basılı" : "S Pen Havada Algılandı");
                updateDOM('hoverColor', e.buttons === 2 ? "var(--accent-red)" : "var(--accent-blue)", false, true);
                
                hoverZamanAsimi = setTimeout(() => { updateDOM('hover', ""); }, 500);
            } else {
                updateDOM('hover', ""); 
            }

        }, { passive: false });
    });

</script>
</body>
</html>
