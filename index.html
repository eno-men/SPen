<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S Pen ve İşaretçi Tanılama Aracı</title>
<link rel="icon" href="https://i.hizliresim.com/eqbsaii.png" type="image/png">

<style>
    :root {
        --bg-color: #0f0f0f;
        --text-main: #ffffff;
        --text-muted: #a3a3a3;
        --accent-green: #4ade80;
        --accent-red: #ef4444;
        --accent-blue: #60a5fa;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background: var(--bg-color);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none; 
    }

    #cizimAlani {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
        touch-action: none;
    }

    #panel {
        position: fixed;
        top: clamp(10px, 2vh, 15px);
        left: clamp(10px, 2vw, 15px);
        width: clamp(280px, 92vw, 360px);
        max-height: calc(100vh - 30px);
        overflow: hidden;
        padding: clamp(10px, 2vh, 20px);
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
    }

    #panel > * {
        pointer-events: auto;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: clamp(5px, 1vh, 10px);
        margin-bottom: clamp(10px, 2vh, 15px);
    }

    .header-container h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
    }

    .header-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 11px;
        font-weight: 500;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.2s ease;
        white-space: nowrap;
    }

    .grid-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(4px, 1vh, 10px);
        flex-grow: 1;
    }

    .veri-kutusu {
        padding: clamp(2px, 0.5vh, 5px) 0;
    }

    .etiket {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
        display: block;
    }

    .deger {
        color: var(--accent-green);
        font-weight: 600;
        font-size: 16px;
        font-family: monospace;
    }

    .genis-kutu {
        grid-column: span 2;
    }

    #durum {
        margin-top: clamp(10px, 2vh, 15px);
        font-size: clamp(14px, 2.5vh, 18px);
        font-weight: bold;
        text-align: center;
        padding: clamp(8px, 1.5vh, 12px) 0;
        transition: color 0.2s;
    }

    .basili { color: var(--accent-green); }
    .basiliDegil { color: var(--accent-red); }

    #hover {
        color: var(--accent-blue);
        font-size: clamp(12px, 2vh, 16px);
        text-align: center;
        margin-top: clamp(5px, 1vh, 10px);
        font-weight: 500;
        min-height: 20px;
    }

    #imlec {
        position: fixed;
        top: 0;
        left: 0;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.5);
        pointer-events: none;
        z-index: 100;
        display: none;
        will-change: transform, width, height;
        transform-origin: center center;
    }

    .butonlar {
        display: flex;
        gap: 10px;
        margin-top: clamp(10px, 2vh, 15px);
    }

    button {
        flex: 1;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 500;
        background: rgba(0,0,0,0.3);
        padding: 5px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
    }

    @media (max-width: 600px) {
        #panel {
            top: 10px; left: 10px; right: 10px;
            width: auto;
        }
    }
</style>
</head>

<body>

<canvas id="cizimAlani"></canvas>
<div id="imlec"></div>

<div id="panel">
    <div class="header-container">
        <h1>Tanılama Verileri</h1>
        <a href="https://many.bio/enomen" target="_blank" class="header-link">enomen tarafından yapılmıştır</a>
    </div>

    <div class="grid-container">
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Aygıt Tipi / Yenileme (Hz)</span>
            <span class="deger" id="tur">-</span> | <span class="deger" id="hz" style="color: #facc15;">0 Hz</span>
        </div>
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Olay (Event)</span>
            <span class="deger" id="eventType">-</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Koordinat X</span>
            <span class="deger" id="x">0</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Koordinat Y</span>
            <span class="deger" id="y">0</span>
        </div>
        <div class="veri-kutusu genis-kutu">
            <span class="etiket">Basınç (Pressure)</span>
            <span class="deger" id="pressure">0.000</span>
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Eğim X (Tilt X)</span>
            <span class="deger" id="tiltX">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Eğim Y (Tilt Y)</span>
            <span class="deger" id="tiltY">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">Yön (Azimuth)</span>
            <span class="deger" id="azimuth">0</span>°
        </div>
        <div class="veri-kutusu">
            <span class="etiket">İrtifa (Altitude)</span>
            <span class="deger" id="altitude">0</span>°
        </div>
    </div>

    <div id="durum" class="basiliDegil">Hazır Bekleniyor</div>
    <div id="hover"></div>

    <div class="butonlar">
        <button onclick="temizle()">Çizimi Temizle</button>
        <button onclick="tamEkran()">Tam Ekran</button>
    </div>
</div>

<script>
    const els = {
        tur: document.getElementById("tur"),
        hz: document.getElementById("hz"),
        eventType: document.getElementById("eventType"),
        x: document.getElementById("x"),
        y: document.getElementById("y"),
        pressure: document.getElementById("pressure"),
        tiltX: document.getElementById("tiltX"),
        tiltY: document.getElementById("tiltY"),
        azimuth: document.getElementById("azimuth"),
        altitude: document.getElementById("altitude"),
        durum: document.getElementById("durum"),
        hover: document.getElementById("hover")
    };

    const imlec = document.getElementById("imlec");
    const canvas = document.getElementById("cizimAlani");
    
    // Gecikmeyi önleyen anahtar parametre: desynchronized
    const ctx = canvas.getContext("2d", { desynchronized: true }); 

    let ciziliyorMu = false;
    let sonX = 0;
    let sonY = 0;
    
    // Hz hesaplaması için optimize edilmiş değişkenler
    let eventSayaci = 0;
    setInterval(() => {
        els.hz.textContent = `${eventSayaci} Hz`;
        eventSayaci = 0;
    }, 1000);

    // DOM güncellemelerini tutmak için durum (state) objesi
    let uiDurumu = null;
    let uiGuncellemeBekliyor = false;

    function tuvaliSabitle() {
        const ekranG = window.screen.width || window.innerWidth;
        const ekranY = window.screen.height || window.innerHeight;
        const devasaBoyut = Math.max(ekranG, ekranY) * 2;
        
        canvas.width = devasaBoyut;
        canvas.height = devasaBoyut;
    }
    
    tuvaliSabitle();

    function temizle() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function tamEkran() {
        const doc = window.document;
        const docEl = doc.documentElement;
        const requestFullScreen = docEl.requestFullscreen || docEl.webkitRequestFullScreen;
        const cancelFullScreen = doc.exitFullscreen || doc.webkitExitFullscreen;

        if(!doc.fullscreenElement && !doc.webkitFullscreenElement) {
            if (requestFullScreen) requestFullScreen.call(docEl).catch(() => {});
        } else {
            if (cancelFullScreen) cancelFullScreen.call(doc);
        }
    }

    function aygitAdi(pointerType) {
        if(pointerType === "pen") return "Kalem / S Pen";
        if(pointerType === "touch") return "Dokunmatik";
        if(pointerType === "mouse") return "Mouse";
        return pointerType || "Bilinmiyor";
    }

    function rad2deg(rad) {
        return (rad * 180 / Math.PI).toFixed(1);
    }

    // Arayüzü yormadan (60FPS ile) verileri ekrana yazdıran fonksiyon
    function arayuzuGuncelle() {
        if (!uiDurumu) {
            uiGuncellemeBekliyor = false;
            return;
        }

        const e = uiDurumu.event;
        const olayTipi = uiDurumu.tip;

        els.tur.textContent = aygitAdi(e.pointerType);
        els.eventType.textContent = olayTipi;
        els.x.textContent = Math.round(e.clientX);
        els.y.textContent = Math.round(e.clientY);
        els.pressure.textContent = e.pressure.toFixed(3);
        els.tiltX.textContent = Math.round(e.tiltX || 0);
        els.tiltY.textContent = Math.round(e.tiltY || 0);
        els.azimuth.textContent = e.azimuthAngle !== undefined ? rad2deg(e.azimuthAngle) : "D/Y";
        els.altitude.textContent = e.altitudeAngle !== undefined ? rad2deg(e.altitudeAngle) : "D/Y";

        if (["pointerout", "pointerleave", "pointercancel"].includes(olayTipi)) {
            imlec.style.display = "none";
            els.durum.textContent = "Temas Yok";
            els.durum.className = "basiliDegil";
            els.hover.textContent = "";
        } else {
            imlec.style.display = "block";
            
            // GPU Hızlandırmalı İmleç Konumlandırması (Lag'ı çözen ana etkenlerden biri)
            const gorselBasinc = e.pressure > 0 ? e.pressure : 0.1;
            const boyut = 20 * gorselBasinc;
            imlec.style.width = `${boyut}px`;
            imlec.style.height = `${boyut}px`;
            imlec.style.transform = `translate3d(${e.clientX - boyut/2}px, ${e.clientY - boyut/2}px, 0)`;
            
            if (e.pointerType === "pen" && e.pressure > 0) {
                imlec.style.backgroundColor = "rgba(74, 222, 128, 0.5)";
                imlec.style.borderColor = "transparent";
            } else {
                imlec.style.backgroundColor = "transparent";
                imlec.style.borderColor = "rgba(255,255,255,0.5)";
            }

            if (e.buttons > 0) {
                els.durum.textContent = e.pointerType === "pen" && e.buttons === 2 
                    ? "S Pen Tuşuna + Ekrana Basıldı" 
                    : "Ekrana Temas Ediliyor";
                els.durum.className = "basili";
                els.hover.textContent = "";
            } else {
                els.durum.textContent = "Temas Yok";
                els.durum.className = "basiliDegil";
                
                if (e.pointerType === "pen") {
                    els.hover.textContent = e.buttons === 2 ? "S Pen Havada + Tuşa Basılı" : "S Pen Havada Algılandı";
                    els.hover.style.color = e.buttons === 2 ? "var(--accent-red)" : "var(--accent-blue)";
                }
            }
        }

        uiGuncellemeBekliyor = false;
    }

    const olaylar = [
        "pointermove", "pointerdown", "pointerup", 
        "pointercancel", "pointerout", "pointerleave", "pointerrawupdate"
    ];

    olaylar.forEach(tip => {
        window.addEventListener(tip, e => {
            // Frekans hesaplaması
            if(tip === "pointermove" || tip === "pointerrawupdate") {
                eventSayaci++;
            }

            const isElement = e.target instanceof Element;
            const panelUzerinde = isElement && !!e.target.closest('#panel');
            
            if (!panelUzerinde && e.cancelable) {
                e.preventDefault(); 
            }

            // ÇİZİM İŞLEMİ (Eşzamanlı/Senkron - Gecikmesiz)
            if (tip === "pointerdown" && !panelUzerinde) {
                ciziliyorMu = true;
                sonX = e.clientX;
                sonY = e.clientY;
                try { canvas.setPointerCapture(e.pointerId); } catch(err) {} 
            } else if (tip === "pointermove" && ciziliyorMu) {
                ctx.beginPath();
                ctx.moveTo(sonX, sonY);
                ctx.lineTo(e.clientX, e.clientY);
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = e.pointerType === "pen" ? Math.max(1, e.pressure * 10) : 2;
                
                if (e.pointerType === "pen") ctx.strokeStyle = '#4ade80';
                else if (e.pointerType === "touch") ctx.strokeStyle = '#60a5fa';
                else ctx.strokeStyle = '#ffffff';

                ctx.stroke();
                sonX = e.clientX;
                sonY = e.clientY;
            } else if (["pointerup", "pointercancel", "pointerout", "pointerleave"].includes(tip)) {
                ciziliyorMu = false;
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
            }

            // DOM GÜNCELLEMESİ (Asenkron - İşlemciyi boğmamak için)
            // Sadece gerekli verileri kopyalayarak state objesine alıyoruz
            uiDurumu = {
                tip: tip,
                event: {
                    pointerType: e.pointerType,
                    clientX: e.clientX,
                    clientY: e.clientY,
                    pressure: e.pressure,
                    tiltX: e.tiltX,
                    tiltY: e.tiltY,
                    azimuthAngle: e.azimuthAngle,
                    altitudeAngle: e.altitudeAngle,
                    buttons: e.buttons
                }
            };

            // Eğer sırada bekleyen bir güncelleme yoksa, yeni karede çalışmak üzere kuyruğa ekle
            if (!uiGuncellemeBekliyor) {
                uiGuncellemeBekliyor = true;
                requestAnimationFrame(arayuzuGuncelle);
            }

        }, { passive: false });
    });

</script>
</body>
</html>
